version: 2.1

orbs:
  win: circleci/windows@5.0

parameters:
  release_artifacts:
    type: boolean
    default: false

jobs:
  windows-release:
    executor:
      name: win/default
      size: medium
    steps:
      - checkout
      - run:
          name: Install Rust
          shell: powershell.exe
          command: |
            Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile "rustup-init.exe"
            .\rustup-init.exe -y --default-toolchain 1.94.0 --profile minimal
      - run:
          name: Build Windows release artifacts
          shell: powershell.exe
          command: |
            $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
            $ErrorActionPreference = "Stop"
            $env:CIRCLECI_GH_TOKEN = [System.Environment]::GetEnvironmentVariable("CIRCLECI_GH_TOKEN")
            git config --global url."https://x-access-token:$env:CIRCLECI_GH_TOKEN@github.com/".insteadOf "https://github.com/"
            git config --global url."https://x-access-token:$env:CIRCLECI_GH_TOKEN@github.com/".insteadOf "ssh://git@github.com/"
            $env:CARGO_NET_GIT_FETCH_WITH_CLI = "true"
            cargo build --release
            New-Item -ItemType Directory -Path dist -Force | Out-Null
            
            # Try specific naming to dx-metasearch.exe
            if (Test-Path "target\release\metasearch.exe") {
                Copy-Item -Path "target\release\metasearch.exe" -Destination "dist\dx-metasearch.exe" -Force
            }
            if (Test-Path "target\release\dx-metasearch.exe") {
                Copy-Item -Path "target\release\dx-metasearch.exe" -Destination "dist\dx-metasearch.exe" -Force
            }
            if (Test-Path "target\release\search_cli.exe") {
                # for metasearch or similar
                Copy-Item -Path "target\release\search_cli.exe" -Destination "dist\dx-metasearch.exe" -Force
            }

            if ($env:CIRCLE_SHA1) {
                $shortSha = $env:CIRCLE_SHA1.Substring(0, 12)
            } else {
                $shortSha = "local"
            }
            $archive = "dx-metasearch-windows-x86_64-$shortSha.zip"
            if (Test-Path "dist\*.exe") {
                Compress-Archive -Path "dist\*" -DestinationPath "dist\$archive" -Force
                $hash = Get-FileHash -Algorithm SHA256 -Path "dist\$archive"
                "$($hash.Hash.ToLowerInvariant())  $archive" | Set-Content -Path "dist\SHA256SUMS.txt" -Encoding ASCII
            }
      - store_artifacts:
          path: dist
      - run:
          name: Upload artifact to GitHub release
          shell: powershell.exe
          command: |
            choco install gh -y --no-progress
            $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH", "User")
            $env:GH_TOKEN = [System.Environment]::GetEnvironmentVariable("CIRCLECI_GH_TOKEN")
            $tag = "windows"
            gh release create $tag --repo essence-dx/metasearch --title "Windows Release" --target $env:CIRCLE_SHA1 2>$null; $LASTEXITCODE = 0
            $zipFiles = (Get-ChildItem "dist\*.zip").FullName
            if ($zipFiles) {
                gh release upload $tag @zipFiles --repo essence-dx/metasearch --clobber
            } else {
                Write-Error "No zip files found in dist\"
                exit 1
            }

workflows:
  release:
    when: << pipeline.parameters.release_artifacts >>
    jobs:
      - windows-release






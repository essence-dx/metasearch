[build]
# target-cpu=native: enables auto-detection of all SIMD extensions available  
# on the build machine (AVX2, AVX-512, etc.). Only applied to x86_64 targets.
# Per-target: use x86-64-v3 for distributed or native for self-hosted.

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=native"]

[target.aarch64-unknown-linux-gnu]
rustflags = []

[target.aarch64-unknown-linux-musl]
rustflags = []

[target.aarch64-apple-darwin]
rustflags = []

[profile.release]
